                <div class="border-l-2 border-green-200 pl-8 space-y-10 relative">
                    <div class="timeline-item relative">
                        <span class="text-xs font-bold text-green-700 uppercase tracking-widest">1988</span>
                        <h3 class="font-semibold text-lg mt-1 text-slate-900">Establishment of DAR</h3>
                        <p class="text-slate-600 mt-2 leading-relaxed">The Department of Agrarian Reform was established under Republic Act No. 6657, known as the Comprehensive Agrarian Reform Law (CARL), to carry out land redistribution across the Philippines.</p>
                    </div>
                    <div class="timeline-item relative">
                        <span class="text-xs font-bold text-green-700 uppercase tracking-widest">Early 1990s</span>
                        <h3 class="font-semibold text-lg mt-1 text-slate-900">Legal Division Formed</h3>
                        <p class="text-slate-600 mt-2 leading-relaxed">The Legal Division was created to handle the growing volume of agrarian disputes, land conversion cases, and legal concerns arising from the implementation of CARL in the Bicol Region.</p>
                    </div>
                    <div class="timeline-item relative">
                        <span class="text-xs font-bold text-green-700 uppercase tracking-widest">2000s</span>
                        <h3 class="font-semibold text-lg mt-1 text-slate-900">Expansion of Services</h3>
                        <p class="text-slate-600 mt-2 leading-relaxed">The division expanded its services to include Alternative Dispute Resolution (ADR), providing farmers and landowners a faster, more accessible path to resolving conflicts outside formal courts.</p>
                    </div>
                    <div class="timeline-item relative">
                        <span class="text-xs font-bold text-green-700 uppercase tracking-widest">Present</span>
                        <h3 class="font-semibold text-lg mt-1 text-slate-900">Continued Service</h3>
                        <p class="text-slate-600 mt-2 leading-relaxed">Today, the Legal Division continues to serve the agrarian community of Albay Province, adjudicating cases and ensuring that the rights of farmers and rural workers are fully protected under the law.</p>
                    </div>
                </div>
            </div>

                    <p class="text-slate-800 leading-relaxed font-medium">The Legal Division is mandated to provide legal assistance and services in the implementation of agrarian reform laws, adjudicate agrarian law implementation cases, and ensure the protection of the rights of agrarian reform beneficiaries.</p>
