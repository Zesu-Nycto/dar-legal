<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAR Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen">
    <div class="bg-white p-10 rounded-[2rem] shadow-2xl w-full max-w-md border border-slate-100">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-slate-900">Admin Access</h1>
            <p class="text-slate-500 mt-2">Enter your DAR credentials</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Email Address</label>
                <input type="email" id="email" required class="w-full px-5 py-4 rounded-xl border border-slate-200 focus:ring-4 focus:ring-green-500/10 focus:border-green-600 outline-none transition-all">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Password</label>
                <input type="password" id="password" required class="w-full px-5 py-4 rounded-xl border border-slate-200 focus:ring-4 focus:ring-green-500/10 focus:border-green-600 outline-none transition-all">
            </div>
            <button type="submit" class="w-full bg-green-600 text-white font-bold py-4 rounded-xl hover:bg-green-700 hover:scale-[1.02] active:scale-[0.98] transition-all shadow-lg shadow-green-600/20">
                Sign In
            </button>
        </form>
        <p id="message" class="mt-6 text-center text-sm text-red-500 hidden"></p>
    </div>
</body>
<div class="absolute top-8 left-8 z-50">
    <a href="index.html" class="flex items-center space-x-2 text-slate-500 hover:text-green-700 transition-colors font-medium">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        <span>Back to Portal</span>
    </a>
</div>
</html>
